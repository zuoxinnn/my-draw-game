<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>你畫我猜：手機房間版</title>
    <style>
        * { box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; }
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        /* 響應式佈局 */
        #game-layout { display: flex; flex-wrap: wrap; gap: 10px; width: 100%; max-width: 1000px; justify-content: center; }
        
        #lobby-view { background: white; padding: 20px; border-radius: 12px; width: 100%; max-width: 500px; text-align: center; }
        .room-item { border: 1px solid #ddd; padding: 10px; margin: 5px 0; display: flex; justify-content: space-between; border-radius: 8px; }
        
        #canvas-wrap { background: white; padding: 10px; border-radius: 10px; position: relative; flex: 1; min-width: 320px; }
        canvas { border: 1px solid #ddd; width: 100%; height: auto; aspect-ratio: 4/3; background: #fff; touch-action: none; }
        
        #chat-wrap { width: 100%; max-width: 300px; background: white; border-radius: 10px; padding: 10px; height: 300px; display: flex; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; font-size: 14px; }
        
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; border-radius: 10px; padding: 20px; }
        .btn { padding: 8px 15px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }
        .btn-primary { background: #2196F3; color: white; }
        .btn-danger { background: #f44336; color: white; }
    </style>
</head>
<body>

    <div id="lobby-view">
        <h2>🎨 你畫我猜房間版</h2>
        <input type="text" id="username" placeholder="你的暱稱" style="padding:10px; width:80%; margin-bottom:10px;">
        <br>
        <button class="btn btn-primary" onclick="createRoom()">創造房間</button>
        <hr>
        <h4>可用房間 (最多5人)</h4>
        <div id="room-list">正在搜尋房間...</div>
    </div>

    <div id="game-view" style="display:none; width:100%;">
        <div style="display:flex; justify-content: space-between; margin-bottom:10px; width:100%;">
            <button class="btn btn-danger" onclick="leaveRoom()">退出房間</button>
            <div id="room-display-id">房間: ----</div>
            <button id="host-end-btn" class="btn btn-danger" style="display:none;" onclick="hostEndGame()">強制結束</button>
        </div>

        <div id="game-layout">
            <div id="canvas-wrap">
                <div id="status-bar" style="font-weight:bold; color:#2196F3;">等待開始...</div>
                <div id="timer">時間: ---</div>
                <canvas id="canvas"></canvas>

                <div id="word-overlay" class="overlay"><h3>請選擇題目</h3><div id="word-options"></div></div>
                <div id="result-overlay" class="overlay"><h2>🏆 排名</h2><div id="winners-list"></div></div>

                <div id="tools" style="display:none; margin-top:10px;">
                    <div id="colors" style="display:flex; flex-wrap:wrap; gap:5px; margin-bottom:5px;"></div>
                    <button onclick="clearCanvas()">清除</button>
                    筆刷: <input type="range" id="size" min="1" max="15" value="3" style="width:100px;">
                </div>
                
                <div id="host-controls" style="display:none; margin-top:10px;">
                    <button class="btn btn-primary" onclick="socket.emit('start_game', currentRoomId)">開始遊戲</button>
                </div>
            </div>

            <div id="chat-wrap">
                <div id="player-list" style="font-size:12px; border-bottom:1px solid #eee; padding-bottom:5px; margin-bottom:5px;"></div>
                <div id="messages"></div>
                <input type="text" id="chat-input" placeholder="答案..." style="width:100%; padding:8px; margin-top:5px;">
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let currentRoomId = null, isOwner = false, isDrawer = false, drawing = false, currentColor = 'black';

        // 設定畫布解析度
        function initCanvas() {
            const size = canvas.offsetWidth;
            canvas.width = 500; canvas.height = 375; // 固定內部解析度以保持同步
        }

        // 繪圖邏輯 (支援滑鼠與觸控)
        const getPos = (e) => {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { 
                x: (clientX - rect.left) * (canvas.width / rect.width), 
                y: (clientY - rect.top) * (canvas.height / rect.height) 
            };
        };

        const startDraw = (e) => { 
            if(!isDrawer) return; e.preventDefault(); 
            drawing = true; const pos = getPos(e); 
            const data = { ...pos, color: currentColor, size: document.getElementById('size').value, type:'start', roomId: currentRoomId };
            socket.emit('draw_data', data); paint(data);
        };

        const moveDraw = (e) => {
            if(!drawing || !isDrawer) return; e.preventDefault();
            const pos = getPos(e);
            const data = { ...pos, color: currentColor, size: document.getElementById('size').value, type:'draw', roomId: currentRoomId };
            socket.emit('draw_data', data); paint(data);
        };

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', moveDraw);
        canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
        canvas.addEventListener('touchstart', startDraw);
        canvas.addEventListener('touchmove', moveDraw);
        canvas.addEventListener('touchend', () => { drawing = false; ctx.beginPath(); });

        function paint(data) {
            ctx.lineWidth = data.size; ctx.lineCap = 'round'; ctx.strokeStyle = data.color;
            if (data.type === 'start') { ctx.beginPath(); ctx.moveTo(data.x, data.y); }
            else { ctx.lineTo(data.x, data.y); ctx.stroke(); }
        }

        // 房間控制
        function createRoom() {
            const name = document.getElementById('username').value;
            if(name) socket.emit('create_room', { name });
        }

        function joinRoom(id) {
            const name = document.getElementById('username').value;
            if(name) socket.emit('join_room', { roomId: id, name });
            else alert('請先輸入暱稱');
        }

        function leaveRoom() { location.reload(); }
        function hostEndGame() { socket.emit('host_end_game', currentRoomId); }
        function clearCanvas() { socket.emit('clear_canvas', currentRoomId); }

        // Socket 監聽
        socket.on('room_list', (rooms) => {
            const container = document.getElementById('room-list');
            container.innerHTML = rooms.length ? '' : '目前沒有房間，趕快創造一個！';
            rooms.forEach(r => {
                container.innerHTML += `<div class="room-item">
                    <span>🏠 ${r.id} (${r.count}/5) - ${r.status}</span>
                    <button class="btn btn-primary" onclick="joinRoom('${r.id}')" ${r.count>=5 || r.status!=='LOBBY' ? 'disabled' : ''}>加入</button>
                </div>`;
            });
        });

        socket.on('joined_room', (data) => {
            currentRoomId = data.roomId;
            isOwner = data.isOwner;
            document.getElementById('lobby-view').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
            document.getElementById('room-display-id').innerText = `房間: ${data.roomId}`;
            document.getElementById('host-controls').style.display = isOwner ? 'block' : 'none';
            document.getElementById('host-end-btn').style.display = isOwner ? 'block' : 'none';
            initCanvas();
        });

        socket.on('you_are_owner', () => {
            isOwner = true;
            document.getElementById('host-controls').style.display = 'block';
            document.getElementById('host-end-btn').style.display = 'block';
        });

        socket.on('update_players', (players) => {
            document.getElementById('player-list').innerHTML = '玩家: ' + players.map(p => `<span style="color:${p.color}">${p.name}(${p.score})</span>`).join(' | ');
        });

        socket.on('round_start', (data) => {
            document.getElementById('result-overlay').style.display = 'none';
            document.getElementById('status-bar').innerText = `第 ${data.round} 回合: 等待 ${data.drawerName} 選題...`;
            document.getElementById('host-controls').style.display = 'none';
        });

        socket.on('select_word_options', (options) => {
            const overlay = document.getElementById('word-overlay');
            overlay.style.display = 'flex';
            const container = document.getElementById('word-options');
            container.innerHTML = '';
            options.forEach(word => {
                const b = document.createElement('button'); b.innerText = word; b.className = 'btn btn-primary'; b.style.margin='5px';
                b.onclick = () => { socket.emit('pick_word', { roomId: currentRoomId, word }); overlay.style.display = 'none'; };
                container.appendChild(b);
            });
        });

        socket.on('round_playing', (data) => {
            isDrawer = (socket.id === data.drawerId);
            document.getElementById('tools').style.display = isDrawer ? 'block' : 'none';
            document.getElementById('status-bar').innerText = isDrawer ? "你是出題者，開始畫畫！" : "觀察畫布，猜猜看！";
        });

        socket.on('your_word', (word) => document.getElementById('status-bar').innerText = `題目：${word}`);
        socket.on('timer_tick', (t) => document.getElementById('timer').innerText = `剩餘時間: ${t}s`);
        socket.on('draw_data', paint);
        socket.on('clear_canvas', () => ctx.clearRect(0,0,canvas.width,canvas.height));
        socket.on('chat_message', (data) => {
            const m = document.getElementById('messages');
            m.innerHTML += `<div><b style="color:${data.color}">${data.sender}:</b> ${data.text}</div>`;
            m.scrollTop = m.scrollHeight;
        });

        socket.on('game_over', (winners) => {
            document.getElementById('result-overlay').style.display = 'flex';
            document.getElementById('winners-list').innerHTML = winners.map((p,i) => `<h4>#${i+1} ${p.name} - ${p.score}分</h4>`).join('');
        });

        socket.on('return_to_lobby', () => {
            document.getElementById('result-overlay').style.display = 'none';
            if(isOwner) document.getElementById('host-controls').style.display = 'block';
            document.getElementById('status-bar').innerText = "遊戲結束，回到大廳";
        });

        socket.on('error_msg', (msg) => alert(msg));

        // 初始顏色按鈕
        const palette = ['red', 'pink', 'orange', 'yellow', 'green', 'lightgreen', 'blue', 'lightblue', 'purple', 'gray', 'black', 'white'];
        palette.forEach(c => {
            const b = document.createElement('div'); b.style.width='20px'; b.style.height='20px'; b.style.background=c; b.style.borderRadius='50%'; b.style.border='1px solid #ccc';
            b.onclick = () => currentColor = c; document.getElementById('colors').appendChild(b);
        });

        document.getElementById('chat-input').onkeypress = (e) => {
            if(e.key === 'Enter') { socket.emit('send_message', { roomId: currentRoomId, text: e.target.value }); e.target.value = ''; }
        };

        window.addEventListener('resize', initCanvas);
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>你畫我猜 10回合決戰版</title>
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: #f4f7f6; margin: 0; display: flex; flex-direction: column; align-items: center; }
        #app { width: 1000px; margin: 20px; }
        
        /* 側邊排行榜 */
        #leaderboard { width: 180px; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .player-item { display: flex; justify-content: space-between; margin-bottom: 8px; padding: 5px; border-bottom: 1px solid #eee; }
        .score { font-weight: bold; color: #e91e63; }

        /* 遊戲區域 */
        #game-layout { display: flex; gap: 15px; margin-top: 15px; }
        #canvas-wrap { background: white; padding: 15px; border-radius: 10px; position: relative; }
        canvas { border: 2px solid #eee; border-radius: 5px; cursor: crosshair; background: #fff; touch-action: none; }
        
        /* 浮層 (選題與結束) */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); 
                   display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10; border-radius: 10px; }
        
        /* 其他 UI */
        #status-bar { width: 100%; background: #2196F3; color: white; padding: 10px; border-radius: 10px; text-align: center; font-size: 1.2em; margin-bottom: 10px; }
        .color-btn { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 2px solid white; box-shadow: 0 0 2px gray; }
        #chat-wrap { width: 250px; background: white; border-radius: 10px; display: flex; flex-direction: column; padding: 10px; height: 500px; }
        #messages { flex-grow: 1; overflow-y: auto; font-size: 0.9em; }
    </style>
</head>
<body>

<div id="app">
    <div id="status-bar">🎨 準備開始遊戲</div>

    <div id="game-layout">
        <div id="leaderboard">
            <h4>🏆 排行榜</h4>
            <div id="player-list"></div>
        </div>

        <div id="canvas-wrap">
            <div id="round-info">第 0 / 10 回合</div>
            <div id="timer">剩餘時間: ---</div>
            
            <canvas id="canvas" width="500" height="400"></canvas>

            <div id="word-overlay" class="overlay">
                <h3>請選擇一個題目</h3>
                <div id="word-options"></div>
            </div>

            <div id="result-overlay" class="overlay">
                <h2>🏆 遊戲結束 🏆</h2>
                <div id="winners-list"></div>
                <p>10 秒後回到大廳...</p>
            </div>

            <div id="tools" style="display:none; margin-top:10px;">
                <input type="color" id="rgb-picker" onchange="currentColor=this.value">
                <button onclick="clearCanvas()">清除</button>
                筆刷: <input type="range" id="size" min="1" max="15" value="3">
                <div style="display:flex; gap:5px; margin-top:5px;" id="colors"></div>
            </div>

            <div id="lobby-ctrl" style="text-align:center; margin-top:20px;">
                <input type="text" id="username" placeholder="輸入暱稱">
                <button onclick="join()">加入</button>
                <button onclick="socket.emit('start_game')" id="start-btn" style="display:none">開始遊戲</button>
            </div>
        </div>

        <div id="chat-wrap">
            <div id="messages"></div>
            <input type="text" id="chat-input" placeholder="輸入答案..." style="margin-top:10px;">
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let isDrawer = false, drawing = false, currentColor = 'black';

    // 初始化顏色按鈕
    const palette = ['red', 'pink', 'orange', 'yellow', 'green', 'lightgreen', 'blue', 'lightblue', 'purple', 'gray', 'black', 'white'];
    palette.forEach(c => {
        const btn = document.createElement('div');
        btn.className = 'color-btn';
        btn.style.background = c;
        btn.onclick = () => currentColor = c;
        document.getElementById('colors').appendChild(btn);
    });

    function join() {
        const name = document.getElementById('username').value;
        if(name) {
            socket.emit('join', name);
            document.getElementById('username').style.display = 'none';
            document.querySelector('button[onclick="join()"]').style.display = 'none';
            document.getElementById('start-btn').style.display = 'inline';
        }
    }

    // 繪圖同步邏輯
    canvas.addEventListener('mousedown', (e) => { if(isDrawer){ drawing=true; sendPoint(e, 'start'); } });
    canvas.addEventListener('mousemove', (e) => { if(drawing && isDrawer) sendPoint(e, 'draw'); });
    canvas.addEventListener('mouseup', () => { drawing=false; ctx.beginPath(); });

    function sendPoint(e, type) {
        const rect = canvas.getBoundingClientRect();
        const data = { x: e.clientX-rect.left, y: e.clientY-rect.top, color: currentColor, size: document.getElementById('size').value, type };
        socket.emit('draw_data', data);
        paint(data);
    }

    function paint(data) {
        ctx.lineWidth = data.size; ctx.lineCap = 'round'; ctx.strokeStyle = data.color;
        if (data.type === 'start') { ctx.beginPath(); ctx.moveTo(data.x, data.y); }
        else { ctx.lineTo(data.x, data.y); ctx.stroke(); }
    }

    function clearCanvas() { socket.emit('clear_canvas'); }

    // Socket 監聽
    socket.on('update_players', (players) => {
        const list = document.getElementById('player-list');
        list.innerHTML = players.sort((a,b)=>b.score-a.score).map(p => 
            `<div class="player-item"><span style="color:${p.color}">● ${p.name}</span><span class="score">${p.score}</span></div>`
        ).join('');
    });

    socket.on('round_start', (data) => {
        document.getElementById('result-overlay').style.display = 'none';
        document.getElementById('round-info').innerText = `第 ${data.round} / ${data.maxRounds} 回合`;
        document.getElementById('status-bar').innerText = `等待 ${data.drawerName} 選題...`;
    });

    socket.on('select_word_options', (options) => {
        const overlay = document.getElementById('word-overlay');
        overlay.style.display = 'flex';
        const container = document.getElementById('word-options');
        container.innerHTML = '';
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.style.margin = '10px'; btn.style.padding = '10px';
            btn.onclick = () => { socket.emit('pick_word', opt); overlay.style.display = 'none'; };
            container.appendChild(btn);
        });
    });

    socket.on('round_playing', (data) => {
        isDrawer = (socket.id === data.drawerId);
        document.getElementById('tools').style.display = isDrawer ? 'block' : 'none';
        document.getElementById('word-overlay').style.display = 'none';
        document.getElementById('status-bar').innerText = isDrawer ? "你是出題者，快畫！" : "觀察畫布猜答案！";
    });

    socket.on('your_word', (word) => document.getElementById('status-bar').innerText = `題目：${word}`);
    socket.on('timer_tick', (t) => document.getElementById('timer').innerText = `剩餘時間: ${t}s`);
    socket.on('draw_data', paint);
    socket.on('clear_canvas', () => ctx.clearRect(0,0,canvas.width,canvas.height));

    socket.on('chat_message', (data) => {
        const msgDiv = document.getElementById('messages');
        msgDiv.innerHTML += `<div><b style="color:${data.color}">${data.sender}:</b> ${data.text}</div>`;
        msgDiv.scrollTop = msgDiv.scrollHeight;
    });

    socket.on('game_over', (winners) => {
        const overlay = document.getElementById('result-overlay');
        overlay.style.display = 'flex';
        document.getElementById('winners-list').innerHTML = winners.map((p, i) => 
            `<h3>第 ${i+1} 名: ${p.name} (${p.score}分)</h3>`
        ).join('');
    });

    socket.on('return_to_lobby', () => {
        document.getElementById('result-overlay').style.display = 'none';
        document.getElementById('lobby-ctrl').style.display = 'block';
        document.getElementById('status-bar').innerText = "遊戲結束，已回到大廳";
    });

    document.getElementById('chat-input').onkeypress = (e) => {
        if(e.key === 'Enter') { socket.emit('send_message', e.target.value); e.target.value = ''; }
    };
</script>
</body>
</html>
